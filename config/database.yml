# PostgreSQL configuration for Active Record
# See https://guides.rubyonrails.org/configuring.html#configuring-a-database

default: &default
  adapter: postgresql
  encoding: unicode
  # Leave `host` unset for development to use the local Unix socket (faster,
  # avoids TCP auth prompts). Set DB_HOST to override if you need TCP.
  # host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  username: <%= ENV.fetch("POSTGRES_USER") { ENV.fetch("USER") } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: attendance_api_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: attendance_api_test

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: attendance_api_production
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
