---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/users/sign_in":
    post:
      summary: Sign in and receive JWT
      tags:
      - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required:
                  - email
                  - password
              required:
              - user
      responses:
        '200':
          description: signed in
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                        format: email
                required:
                - token
                - user
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedError"
  "/users/sign_out":
    delete:
      summary: Revoke current JWT
      tags:
      - Auth
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '204':
          description: signed out
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedError"
  "/api/v1/me":
    get:
      summary: Get current authenticated user
      tags:
      - Auth
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                        format: email
                required:
                - user
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedError"
  "/api/v1/attendance_entries":
    get:
      summary: List attendance entries
      tags:
      - AttendanceEntries
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: attendance entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        studentName:
                          type: string
                        status:
                          type: string
                        recordedAt:
                          type: string
                          format: date-time
                  pagination:
                    type: object
                required:
                - entries
        '401':
          description: unauthorized
    post:
      summary: Create an attendance entry
      tags:
      - AttendanceEntries
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: created
        '401':
          description: unauthorized
        '422':
          description: invalid request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                attendance_entry:
                  type: object
                  properties:
                    student_name:
                      type: string
                    status:
                      type: string
                    recorded_at:
                      type: string
                      format: date-time
                  required:
                  - student_name
                  - status
  "/api/v1/attendance_entries/{id}":
    patch:
      summary: Update an attendance entry
      tags:
      - AttendanceEntries
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: updated
        '401':
          description: unauthorized
        '404':
          description: not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                attendance_entry:
                  type: object
                  properties:
                    student_name:
                      type: string
                    status:
                      type: string
                    recorded_at:
                      type: string
                      format: date-time
    delete:
      summary: Delete an attendance entry
      tags:
      - AttendanceEntries
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: no content
        '401':
          description: unauthorized
        '404':
          description: not found
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: www.example.com
components:
  schemas:
    UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: Invalid Email or password.
        code:
          type: string
          example: unauthorized
      required:
      - error
      - code
