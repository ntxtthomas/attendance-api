name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run Brakeman and save report
        run: bundle exec brakeman -f json -o tmp/brakeman.json --no-progress

      - name: Upload Brakeman report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: brakeman-report
          path: tmp/brakeman.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bundle exec rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: attendance_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: attendance_api_test
        # no `options` here — avoid passing Docker health flags that can cause
        # container create to fail on some runners; we wait for readiness in a step.
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential git libyaml-dev pkg-config postgresql-client

      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          # Set libpq env vars instead of DATABASE_URL to avoid URI parsing issues
          PGHOST: postgres
          PGPORT: 5432
          PGUSER: attendance_user
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          PGDATABASE: attendance_api_test
        run: |
          bundle install --jobs 4 --retry 3
          # wait for Postgres service to be ready
          for i in {1..30}; do
            pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" && break || sleep 1
          done
          bin/rails db:prepare
          bundle exec rspec
